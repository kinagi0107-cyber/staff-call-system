<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフコール - QR呼び出しシステム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
      flex-wrap: wrap;
    }
    .tab-button {
      padding: 12px 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    .tab-button:hover {
      color: #667eea;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      font-size: 14px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }
    .button {
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .button-primary {
      background: #667eea;
      color: white;
    }
    .button-primary:hover {
      background: #5568d3;
    }
    .button-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .button-secondary:hover {
      background: #e0e0e0;
    }
    .button-success {
      background: #22c55e;
      color: white;
      padding: 8px 16px;
      font-size: 12px;
    }
    .button-success:hover {
      background: #16a34a;
    }
    .button-danger {
      background: #ef4444;
      color: white;
    }
    .button-danger:hover {
      background: #dc2626;
    }
    .call-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .call-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .call-item.completed {
      border-left-color: #22c55e;
      background: #f0fdf4;
    }
    .call-item-content {
      flex: 1;
    }
    .call-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .call-item-name {
      font-weight: 600;
      font-size: 16px;
    }
    .call-item-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }
    .status-completed {
      background: #dcfce7;
      color: #166534;
    }
    .call-item-time {
      font-size: 12px;
      color: #999;
    }
    .call-item-actions {
      margin-left: 15px;
      display: flex;
      gap: 10px;
    }
    .qr-container {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      background: white;
    }
    .qr-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .qr-actions button {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
    }
    .modal-content h2 {
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
    }
    .modal-buttons .button-primary {
      background: #667eea;
      color: white;
    }
    .modal-buttons .button-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .overlay-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1001;
    }
    .overlay-screen.active {
      display: flex;
    }
    .overlay-content {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      max-width: 400px;
    }
    .overlay-content h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #667eea;
    }
    .overlay-content p {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .notification-badge {
      display: inline-block;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 スタッフコール</h1>
      <p>QRコードをスキャンして店員を呼び出す</p>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab(event, 'staff')">📊 スタッフダッシュボード <span id="pendingBadge" class="notification-badge" style="display: none;">0</span></button>
      <button class="tab-button" onclick="switchTab(event, 'completed')">📋 対応済み一覧</button>
      <button class="tab-button" onclick="switchTab(event, 'admin')">⚙️ 管理者</button>
      <button class="button button-secondary" onclick="logout()" id="logoutBtn" style="display: none; margin-left: auto;">ログアウト</button>
    </div>

    <!-- スタッフダッシュボード -->
    <div id="staff-tab" class="tab-content active">
      <div class="card">
        <h2 style="margin-bottom: 20px;">呼び出し一覧（対応待ち）</h2>
        <div id="callList" class="call-list">
          <p style="text-align: center; color: #999; padding: 40px 20px;">呼び出しはまだありません</p>
        </div>
      </div>
    </div>

    <!-- 対応済み一覧 -->
    <div id="completed-tab" class="tab-content">
      <div class="card">
        <h2 style="margin-bottom: 20px;">対応済み呼び出し一覧</h2>
        <div id="completedList" class="call-list">
          <p style="text-align: center; color: #999; padding: 40px 20px;">対応済みの呼び出しはありません</p>
        </div>
      </div>
    </div>

    <!-- 管理者タブ -->
    <div id="admin-tab" class="tab-content">
      <div class="grid">
        <div class="card">
          <h2 style="margin-bottom: 20px;">新しいQRコードを作成</h2>
          <div class="form-group">
            <label>QRコード名</label>
            <input type="text" id="qrNameInput" placeholder="例: テーブル1, 売場A">
          </div>
          <button class="button button-primary" onclick="createQRCode()" style="width: 100%;">+ 作成</button>
        </div>
        <div class="card">
          <h2 style="margin-bottom: 20px;">QRコード一覧</h2>
          <div id="qrList"></div>
        </div>
      </div>
      <div class="card" style="margin-top: 20px;">
        <h2 style="margin-bottom: 20px;">危険なアクション</h2>
        <button class="button button-danger" onclick="deleteAllCompletedCalls()">🗑️ すべての対応済み呼び出し履歴を削除</button>
      </div>
    </div>
  </div>

  <!-- 処理中画面 -->
  <div id="processingScreen" class="overlay-screen">
    <div class="overlay-content">
      <h2>処理中...</h2>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- 完了画面 -->
  <div id="completionScreen" class="overlay-screen">
    <div class="overlay-content">
      <h2>✅ 呼び出し完了</h2>
      <p>しばらくお待ちください。</p>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- パスワード認証モーダル -->
  <div id="passwordModal" class="modal active">
    <div class="modal-content">
      <h2>🔐 パスワードでログイン</h2>
      <input type="password" id="passwordInput" placeholder="パスワードを入力">
      <div class="modal-buttons">
        <button class="button button-primary" onclick="login()">ログイン</button>
        <button class="button button-secondary" onclick="cancelLogin()">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let isLoggedIn = false;
    let qrCodes = [];
    let calls = [];
    let eventSource = null;

    // タブ切り替え
    function switchTab(event, tab) {
      if (tab === 'admin' && !isLoggedIn) {
        document.getElementById('passwordModal').classList.add('active');
        return;
      }

      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab + '-tab').classList.add('active');
      event.target.classList.add('active');

      if (tab === 'staff') {
        loadCalls();
      } else if (tab === 'completed') {
        loadCompletedCalls();
      } else if (tab === 'admin') {
        loadQRCodes();
      }
    }

    // ログイン
    function login() {
      const password = document.getElementById('passwordInput').value;
      if (password === 'nanaehama2611') {
        isLoggedIn = true;
        document.getElementById('passwordModal').classList.remove('active');
        document.getElementById('logoutBtn').style.display = 'block';
        loadQRCodes();
      } else {
        alert('パスワードが間違っています');
      }
    }

    function cancelLogin() {
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordModal').classList.remove('active');
    }

    function logout() {
      isLoggedIn = false;
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('passwordInput').value = '';
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      document.getElementById('staff-tab').classList.add('active');
      document.querySelector('.tab-button').classList.add('active');
    }

    // QRコード取得
    async function loadQRCodes() {
      try {
        const response = await fetch(API_URL + '/qr-codes');
        qrCodes = await response.json();
        
        // 管理者用リストを更新
        const qrList = document.getElementById('qrList');
        qrList.innerHTML = '';
        qrCodes.forEach(code => {
          const div = document.createElement('div');
          div.style.marginBottom = '30px';
          
          const nameDiv = document.createElement('div');
          nameDiv.style.marginBottom = '10px';
          
          const strong = document.createElement('strong');
          strong.textContent = code.name;
          nameDiv.appendChild(strong);
          div.appendChild(nameDiv);
          
          const qrContainer = document.createElement('div');
          qrContainer.id = 'qr-' + code.id;
          qrContainer.className = 'qr-container';
          div.appendChild(qrContainer);
          
          // アクションボタン
          const actions = document.createElement('div');
          actions.className = 'qr-actions';
          
          const copyBtn = document.createElement('button');
          copyBtn.className = 'button button-secondary';
          copyBtn.textContent = 'リンクをコピー';
          copyBtn.type = 'button';
          copyBtn.addEventListener('click', function() {
            copyToClipboard(window.location.origin + '?call=' + code.id);
          });
          actions.appendChild(copyBtn);
          
          const testBtn = document.createElement('button');
          testBtn.className = 'button button-primary';
          testBtn.textContent = 'テスト呼び出し';
          testBtn.type = 'button';
          testBtn.addEventListener('click', function() {
            testCall(code.id, code.name);
          });
          actions.appendChild(testBtn);
          
          div.appendChild(actions);
          
          qrList.appendChild(div);
          
          // QRコードを生成
          generateQrImage('qr-' + code.id, window.location.origin + '?call=' + code.id);
        });
      } catch (error) {
        console.error('Error fetching QR codes:', error);
      }
    }

    // QRコード生成
    function generateQrImage(containerId, text) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      container.innerHTML = '';
      
      try {
        new QRCode(container, {
          text: text,
          width: 180,
          height: 180,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch (error) {
        console.error('QR Code generation error:', error);
        container.innerHTML = '<p style="color: red;">QRコード生成エラー</p>';
      }
    }

    // QRコード作成
    async function createQRCode() {
      const name = document.getElementById('qrNameInput').value;
      if (!name) {
        alert('QRコード名を入力してください');
        return;
      }

      try {
        const response = await fetch(API_URL + '/qr-codes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        
        if (response.ok) {
          document.getElementById('qrNameInput').value = '';
          loadQRCodes();
          alert('QRコードを作成しました');
        }
      } catch (error) {
        console.error('Error creating QR code:', error);
      }
    }

    // リアルタイム更新用のEventSource
    function startRealtimeUpdates() {
      if (eventSource) {
        eventSource.close();
      }
      
      eventSource = new EventSource(API_URL + '/updates');
      
      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'new-call') {
            // 新しい呼び出しがある場合
            loadCalls();
            playNotificationSound();
            showNotification('🔔 新しい呼び出し', data.call.location_name || '場所未指定');
            updatePendingBadge();
          } else if (data.type === 'call_updated') {
            // 呼び出しが更新された場合
            loadCalls();
            loadCompletedCalls();
            updatePendingBadge();
          }
        } catch (e) {
          console.error('Error parsing SSE message:', e);
        }
      };
      
      eventSource.onerror = () => {
        console.error('SSE connection error');
        eventSource.close();
        // 3秒後に再接続
        setTimeout(startRealtimeUpdates, 3000);
      };
    }

    // ブラウザ通知を表示
    function showNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, {
          body: body,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>'
        });
      }
    }

    // 呼び出し一覧取得（対応待ち）
    async function loadCalls() {
      try {
        const response = await fetch(API_URL + '/calls');
        calls = await response.json();
        
        const pendingCalls = calls.filter(c => c.status === 'pending');
        const callList = document.getElementById('callList');
        
        if (pendingCalls.length === 0) {
          callList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 20px;">呼び出しはまだありません</p>';
          updatePendingBadge();
          return;
        }

        callList.innerHTML = '';
        pendingCalls.forEach(call => {
          const div = document.createElement('div');
          div.className = 'call-item';
          
          const content = document.createElement('div');
          content.className = 'call-item-content';
          
          const header = document.createElement('div');
          header.className = 'call-item-header';
          
          const name = document.createElement('div');
          name.className = 'call-item-name';
          name.textContent = call.location_name || '場所未指定';
          header.appendChild(name);
          
          const status = document.createElement('span');
          status.className = 'call-item-status status-pending';
          status.textContent = '対応待ち';
          header.appendChild(status);
          
          content.appendChild(header);
          
          const time = document.createElement('div');
          time.className = 'call-item-time';
          const createdAt = new Date(call.created_at);
          time.textContent = createdAt.toLocaleString('ja-JP');
          content.appendChild(time);
          
          div.appendChild(content);
          
          // 対応済みボタン
          const actions = document.createElement('div');
          actions.className = 'call-item-actions';
          
          const completeBtn = document.createElement('button');
          completeBtn.className = 'button button-success';
          completeBtn.textContent = '✓ 対応済み';
          completeBtn.type = 'button';
          completeBtn.addEventListener('click', function() {
            markCallAsCompleted(call.id);
          });
          actions.appendChild(completeBtn);
          
          div.appendChild(actions);
          
          callList.appendChild(div);
        });
        updatePendingBadge();
      } catch (error) {
        console.error('Error fetching calls:', error);
      }
    }

    // 対応済み呼び出し一覧取得
    async function loadCompletedCalls() {
      try {
        const response = await fetch(API_URL + '/calls');
        const allCalls = await response.json();
        
        const completedCalls = allCalls.filter(c => c.status === 'completed');
        const completedList = document.getElementById('completedList');
        
        if (completedCalls.length === 0) {
          completedList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 20px;">対応済みの呼び出しはありません</p>';
          return;
        }

        completedList.innerHTML = '';
        completedCalls.forEach(call => {
          const div = document.createElement('div');
          div.className = 'call-item completed';
          
          const content = document.createElement('div');
          content.className = 'call-item-content';
          
          const header = document.createElement('div');
          header.className = 'call-item-header';
          
          const name = document.createElement('div');
          name.className = 'call-item-name';
          name.textContent = call.location_name || '場所未指定';
          header.appendChild(name);
          
          const status = document.createElement('span');
          status.className = 'call-item-status status-completed';
          status.textContent = '対応完了';
          header.appendChild(status);
          
          content.appendChild(header);
          
          const time = document.createElement('div');
          time.className = 'call-item-time';
          const createdAt = new Date(call.created_at);
          time.textContent = createdAt.toLocaleString('ja-JP');
          content.appendChild(time);
          
          div.appendChild(content);
          callList.appendChild(div);
        });
      } catch (error) {
        console.error('Error fetching completed calls:', error);
      }
    }

    // 呼び出しを対応済みにマーク
    async function markCallAsCompleted(callId) {
      try {
        const response = await fetch(API_URL + '/calls/' + callId, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'completed' })
        });
        
        if (response.ok) {
          playNotificationSound();
          loadCalls();
          loadCompletedCalls();
          updatePendingBadge();
          
          // 対応済み一覧タブに自動的に切り替わる
          document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
          document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
          document.getElementById('completed-tab').classList.add('active');
          document.querySelectorAll('.tab-button')[1].classList.add('active');
        }
      } catch (error) {
        console.error('Error marking call as completed:', error);
      }
    }

    // 対応済み呼び出しをすべて削除
    async function deleteAllCompletedCalls() {
      if (!confirm('すべての対応済み呼び出し履歴を削除してもよろしいですか？')) {
        return;
      }

      try {
        const response = await fetch(API_URL + '/calls', {
          method: 'DELETE'
        });
        
        if (response.ok) {
          loadCompletedCalls();
          alert('すべての対応済み呼び出し履歴を削除しました');
        }
      } catch (error) {
        console.error('Error deleting calls:', error);
      }
    }

    // 対応待ちバッジを更新
    function updatePendingBadge() {
      const pendingCalls = calls.filter(c => c.status === 'pending');
      const badge = document.getElementById('pendingBadge');
      
      if (pendingCalls.length > 0) {
        badge.textContent = pendingCalls.length;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    // 通知音再生
    function playNotificationSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
      } catch (e) {
        console.error('Error playing notification sound:', e);
      }
    }

    // クリップボードにコピー
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('リンクをコピーしました');
      }).catch(err => {
        console.error('Failed to copy:', err);
      });
    }

    // テスト呼び出し
    async function testCall(qrCodeId, qrCodeName) {
      console.log('Test call triggered for:', qrCodeId, qrCodeName);
      
      try {
        const response = await fetch(API_URL + '/calls', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            qrCodeId: qrCodeId, 
            location: qrCodeName
          })
        });
        
        if (response.ok) {
          console.log('Test call created successfully');
          playNotificationSound();
          loadCalls();
          updatePendingBadge();
          alert('テスト呼び出しを作成しました');
        } else {
          console.error('Failed to create test call:', response.status);
        }
      } catch (error) {
        console.error('Error creating test call:', error);
      }
    }

    // URL パラメータから呼び出しを処理
    async function handleCallFromURL() {
      const params = new URLSearchParams(window.location.search);
      const callId = params.get('call');
      
      if (callId) {
        console.log('Handling call from URL:', callId);
        
        // 処理中画面を表示
        document.getElementById('processingScreen').classList.add('active');
        
        try {
          // QRコード情報を取得
          const qrResponse = await fetch(API_URL + '/qr-codes/' + callId);
          if (qrResponse.ok) {
            const qrCode = await qrResponse.json();
            console.log('QR code found:', qrCode);
            
            // 呼び出しを作成
            const callResponse = await fetch(API_URL + '/calls', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ 
                qrCodeId: callId, 
                location: qrCode.name || '場所未指定'
              })
            });
            
            if (callResponse.ok) {
              console.log('Call created successfully');
              playNotificationSound();
              
              // 処理中画面を非表示
              document.getElementById('processingScreen').classList.remove('active');
              
              // 完了画面を表示
              document.getElementById('completionScreen').classList.add('active');
              
              // 3秒後にページを閉じる
              setTimeout(() => {
                document.getElementById('completionScreen').classList.remove('active');
                
                // ブラウザの戻るボタンで戻る、またはウィンドウを閉じる
                if (window.history.length > 1) {
                  window.history.back();
                } else {
                  window.close();
                }
              }, 3000);
            } else {
              console.error('Failed to create call:', callResponse.status);
              document.getElementById('processingScreen').classList.remove('active');
            }
          } else {
            console.error('QR code not found:', qrResponse.status);
            document.getElementById('processingScreen').classList.remove('active');
          }
        } catch (error) {
          console.error('Error handling call from URL:', error);
          document.getElementById('processingScreen').classList.remove('active');
        }
      }
    }

    // 初期化
    window.addEventListener('load', () => {
      console.log('Page loaded');
      loadCalls();
      
      // ブラウザ通知の許可をリクエスト
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
      
      // リアルタイム更新を開始
      startRealtimeUpdates();
      
      // URL パラメータから呼び出しを処理
      handleCallFromURL();
      
      // 対応待ちバッジを更新
      updatePendingBadge();
    });

    // ページを離れるときはSSEを閉じる
    window.addEventListener('beforeunload', () => {
      if (eventSource) {
        eventSource.close();
      }
    });
  </script>
</body>
