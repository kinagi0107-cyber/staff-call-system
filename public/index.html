<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフコール - QR呼び出しシステム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }
    .tab-button {
      padding: 12px 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    .tab-button:hover {
      color: #667eea;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      font-size: 14px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }
    .button {
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .button-primary {
      background: #667eea;
      color: white;
    }
    .button-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }
    .button-secondary {
      background: #f0f0f0;
      color: #333;
      margin-left: auto;
    }
    .button-secondary:hover {
      background: #e0e0e0;
    }
    .button-danger {
      background: #ff4757;
      color: white;
      width: 100%;
    }
    .button-danger:hover {
      background: #ff3838;
    }
    .qr-container {
      display: flex;
      justify-content: center;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 5px;
      min-height: 220px;
    }
    .qr-container canvas {
      max-width: 100%;
      height: auto;
    }
    .call-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .call-item {
      padding: 15px;
      background: #f9f9f9;
      border-radius: 5px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }
    .call-item-location {
      font-weight: 500;
      color: #333;
    }
    .call-item-time {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    .status-message {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
    }
    .status-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
    }
    .modal-content h2 {
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
    }
    .modal-buttons .button-primary {
      background: #667eea;
      color: white;
    }
    .modal-buttons .button-secondary {
      background: #f0f0f0;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 スタッフコール</h1>
      <p>QRコードをスキャンして店員を呼び出す</p>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('customer')">👥 顧客用</button>
      <button class="tab-button" onclick="switchTab('staff')">📊 スタッフダッシュボード</button>
      <button class="tab-button" onclick="switchTab('admin')">⚙️ 管理者</button>
      <button class="button button-secondary" onclick="logout()" id="logoutBtn" style="display: none;">ログアウト</button>
    </div>

    <!-- 顧客タブ -->
    <div id="customer-tab" class="tab-content active">
      <div class="card">
        <h2 style="margin-bottom: 20px;">QRコードをスキャン</h2>
        <div class="form-group">
          <label>QRコードを選択またはスキャン</label>
          <select id="qrSelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <option value="">-- QRコードを選択 --</option>
          </select>
        </div>
        <div style="margin-bottom: 15px;">
          <button class="button button-primary" onclick="startCamera()" style="width: 100%;">📷 カメラでスキャン</button>
        </div>
        <div class="form-group">
          <label>場所名を入力</label>
          <input type="text" id="locationInput" placeholder="例: テーブル1, 売場A, レジ">
        </div>
        <button class="button button-primary" onclick="callStaff()" style="width: 100%;">🔔 スタッフを呼び出す</button>
      </div>
    </div>

    <!-- スタッフダッシュボード -->
    <div id="staff-tab" class="tab-content">
      <div class="card">
        <h2 style="margin-bottom: 20px;">呼び出し一覧</h2>
        <div id="callList" class="call-list">
          <p style="text-align: center; color: #999; padding: 40px 20px;">呼び出しはまだありません</p>
        </div>
      </div>
    </div>

    <!-- 管理者タブ -->
    <div id="admin-tab" class="tab-content">
      <div class="grid">
        <div class="card">
          <h2 style="margin-bottom: 20px;">新しいQRコードを作成</h2>
          <div class="form-group">
            <label>QRコード名</label>
            <input type="text" id="qrNameInput" placeholder="例: テーブル1, 売場A">
          </div>
          <button class="button button-primary" onclick="createQRCode()" style="width: 100%;">+ 作成</button>
        </div>
        <div class="card">
          <h2 style="margin-bottom: 20px;">QRコード一覧</h2>
          <div id="qrList"></div>
        </div>
      </div>
      <div class="card" style="margin-top: 20px;">
        <h2 style="margin-bottom: 20px;">危険なアクション</h2>
        <button class="button button-danger" onclick="deleteAllCalls()">🗑️ すべての呼び出し履歴を削除</button>
      </div>
    </div>
  </div>

  <!-- パスワード認証モーダル -->
  <div id="passwordModal" class="modal active">
    <div class="modal-content">
      <h2>🔐 パスワードでログイン</h2>
      <input type="password" id="passwordInput" placeholder="パスワードを入力">
      <div class="modal-buttons">
        <button class="button button-primary" onclick="login()">ログイン</button>
        <button class="button button-secondary" onclick="cancelLogin()">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let isLoggedIn = false;
    let qrCodes = [];
    let calls = [];

    // タブ切り替え
    function switchTab(tab) {
      if (tab === 'admin' && !isLoggedIn) {
        document.getElementById('passwordModal').classList.add('active');
        return;
      }

      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab + '-tab').classList.add('active');
      event.target.classList.add('active');

      if (tab === 'staff') {
        loadCalls();
      } else if (tab === 'admin') {
        loadQRCodes();
      }
    }

    // ログイン
    function login() {
      const password = document.getElementById('passwordInput').value;
      if (password === 'nanaehama2611') {
        isLoggedIn = true;
        document.getElementById('passwordModal').classList.remove('active');
        document.getElementById('logoutBtn').style.display = 'block';
        loadQRCodes();
      } else {
        alert('パスワードが間違っています');
      }
    }

    function cancelLogin() {
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordModal').classList.remove('active');
    }

    function logout() {
      isLoggedIn = false;
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('passwordInput').value = '';
      switchTab('customer');
    }

    // QRコード取得
    async function loadQRCodes() {
      try {
        const response = await fetch(API_URL + '/qr-codes');
        qrCodes = await response.json();
        
        // 顧客用セレクトを更新
        const select = document.getElementById('qrSelect');
        select.innerHTML = '<option value="">-- QRコードを選択 --</option>';
        qrCodes.forEach(code => {
          const option = document.createElement('option');
          option.value = code.id;
          option.textContent = code.name;
          select.appendChild(option);
        });

        // 管理者用リストを更新
        const qrList = document.getElementById('qrList');
        qrList.innerHTML = '';
        qrCodes.forEach(code => {
          const div = document.createElement('div');
          div.style.marginBottom = '20px';
          
          const nameDiv = document.createElement('div');
          nameDiv.style.marginBottom = '10px';
          
          const strong = document.createElement('strong');
          strong.textContent = code.name;
          nameDiv.appendChild(strong);
          
          const idDiv = document.createElement('div');
          idDiv.style.fontSize = '12px';
          idDiv.style.color = '#666';
          idDiv.textContent = 'ID: ' + code.id;
          nameDiv.appendChild(idDiv);
          
          const qrContainer = document.createElement('div');
          qrContainer.id = 'qr-' + code.id;
          qrContainer.className = 'qr-container';
          
          div.appendChild(nameDiv);
          div.appendChild(qrContainer);
          qrList.appendChild(div);
          
          // QRコード生成
          generateQRCode(code.id, qrContainer);
        });
      } catch (error) {
        console.error('Error loading QR codes:', error);
      }
    }

    // QRコード生成
    function generateQRCode(text, container) {
      // 既存の内容をクリア
      container.innerHTML = '';
      
      // QRコード生成
      try {
        new QRCode(container, {
          text: text,
          width: 200,
          height: 200,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch (error) {
        console.error('QR Code generation error:', error);
        container.innerHTML = '<p style="color: red;">QRコード生成エラー</p>';
      }
    }

    // QRコード作成
    async function createQRCode() {
      const name = document.getElementById('qrNameInput').value;
      if (!name) {
        alert('QRコード名を入力してください');
        return;
      }

      try {
        const response = await fetch(API_URL + '/qr-codes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        
        if (response.ok) {
          document.getElementById('qrNameInput').value = '';
          loadQRCodes();
          alert('QRコードを作成しました');
        }
      } catch (error) {
        console.error('Error creating QR code:', error);
      }
    }

    // 呼び出し
    async function callStaff() {
      const qrCodeId = document.getElementById('qrSelect').value;
      const location = document.getElementById('locationInput').value;
      
      if (!qrCodeId) {
        alert('QRコードを選択してください');
        return;
      }

      try {
        const response = await fetch(API_URL + '/calls', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrCodeId, location })
        });
        
        if (response.ok) {
          document.getElementById('locationInput').value = '';
          alert('スタッフを呼び出しました');
          playNotificationSound();
        }
      } catch (error) {
        console.error('Error calling staff:', error);
      }
    }

    // リアルタイム更新用のEventSource
    let eventSource = null;

    // リアルタイム更新を開始
    function startRealtimeUpdates() {
      if (eventSource) {
        eventSource.close();
      }
      
      eventSource = new EventSource(API_URL + '/updates');
      
      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'new-call') {
          // 新しい呼び出しがある場合
          calls.unshift(data.call);
          loadCalls();
          playNotificationSound();
          showNotification('新しい呼び出し', data.call.location || '場所未指定');
        }
      };
      
      eventSource.onerror = () => {
        console.error('SSE connection error');
        eventSource.close();
        // 3秒後に再接続
        setTimeout(startRealtimeUpdates, 3000);
      };
    }

    // ブラウザ通知を表示
    function showNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, {
          body: body,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>'
        });
      }
    }

    // 呼び出し一覧取得
    async function loadCalls() {
      try {
        const response = await fetch(API_URL + '/calls');
        calls = await response.json();
        
        const callList = document.getElementById('callList');
        if (calls.length === 0) {
          callList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 20px;">呼び出しはまだありません</p>';
        } else {
          callList.innerHTML = '';
          calls.forEach(call => {
            const div = document.createElement('div');
            div.className = 'call-item';
            
            const location = document.createElement('div');
            location.className = 'call-item-location';
            location.textContent = call.location || '場所未指定';
            
            const time = document.createElement('div');
            time.className = 'call-item-time';
            time.textContent = new Date(call.createdAt).toLocaleString('ja-JP');
            
            div.appendChild(location);
            div.appendChild(time);
            callList.appendChild(div);
          });
        }
      } catch (error) {
        console.error('Error loading calls:', error);
      }
    }

    // すべての呼び出し履歴を削除
    async function deleteAllCalls() {
      if (!confirm('本当にすべての呼び出し履歴を削除しますか？')) {
        return;
      }

      try {
        const response = await fetch(API_URL + '/calls', {
          method: 'DELETE'
        });
        
        if (response.ok) {
          loadCalls();
          alert('呼び出し履歴を削除しました');
        }
      } catch (error) {
        console.error('Error deleting calls:', error);
      }
    }

    // 通知音再生
    function playNotificationSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);
    }

    // カメラスキャン（簡易版）
    function startCamera() {
      alert('カメラ機能はこのバージョンでは利用できません');
    }

    // 初期化
    window.addEventListener('load', () => {
      loadQRCodes();
      
      // ブラウザ通知の許可をリクエスト
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
      
      // リアルタイム更新を開始
      startRealtimeUpdates();
    });

    // ページを離れるときはSSEを閉じる
    window.addEventListener('beforeunload', () => {
      if (eventSource) {
        eventSource.close();
      }
    });
  </script>
</body>
</html>
